# Mac用: ホストのOllamaを利用（Metal GPU対応で高速）
# 事前に brew install ollama && ollama serve が必要
# docker compose -f docker-compose.standalone.mac.yml up --build

services:
  xangi:
    build:
      context: ..
      dockerfile: docker/Dockerfile.standalone
    container_name: xangi-standalone
    restart: unless-stopped
    ports:
      - "18888:18888"
    volumes:
      - ${WORKSPACE_PATH:-../ai-assistant-workspace}:/workspace
    environment:
      - NODE_ENV=production
      - WORKSPACE_PATH=/workspace
      - DATA_DIR=/workspace/.xangi
      - AGENT_BACKEND=local-llm
      - WEB_CHAT_ENABLED=true
      - WEB_CHAT_PORT=18888
      - LOCAL_LLM_BASE_URL=http://host.docker.internal:11434
      - LOCAL_LLM_MODEL=${LOCAL_LLM_MODEL:-gemma4:e4b}
      - LOCAL_LLM_MODE=lite
